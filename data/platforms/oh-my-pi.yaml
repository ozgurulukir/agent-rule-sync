# Oh My Pi Platform Format Profile
# LLM Reference: describes what Oh My Pi expects for rules and skills.
# Same as OpenCode (directory-based, user-scoped).
# NOT enforced by build system — informational.

rules:
  format: markdown
  heading_style: atx
  bullet_style: dash
  code_block: fenced
  frontmatter: strip
  note: "Same as OpenCode directory format"

skills:
  format: single_file
  content_type: markdown
  frontmatter: strip
  note: "Same as OpenCode directory format"

notes: |
  Oh My Pi reads ~/.omp/agent/rules/*.md and ~/.omp/agent/skills/*/SKILL.md.
  User-scoped. Base path is ~/.omp/agent/ (NOT ~/.config/oh-my-pi/).
  omp also discovers rules from other agent dirs (.cursor, .claude, etc.)
  via its TTSR stream rules system with native priority 100.
  Config: ~/.omp/agent/config.yml, models: ~/.omp/agent/models.yml
