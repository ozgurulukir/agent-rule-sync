# Droid Platform Format Profile
# LLM Reference: describes what Droid expects for skills.
# NOT enforced by build system — informational for translator authoring.

rules:
  format: none                   # Droid has no separate rules
  note: "All content is embedded in the single droid.md skill file"

skills:
  format: single_file
  content_type: markdown
  file_name: "droid.md"
  frontmatter: strip
  bullet_style: dash
  code_block: fenced

aggregation: |
  Droid uses a single droid.md. Rulepack vendor aggregation (lib/rulepack/aggregate.rb)
  writes all skill/rule fragments into this file via "---\n\n" separator.

notes: |
notes: |
  Droid reads AGENTS.md hierarchy: project root → parent dirs → ~/.factory/AGENTS.md.
  Rulepack copies aggregated vendor skill to ~/.factory/AGENTS.md.
  Droid-specific config at ~/.factory/droid.md (not managed by rulepack).
