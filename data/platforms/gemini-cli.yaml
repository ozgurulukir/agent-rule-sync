# Gemini CLI Platform Format Profile
# LLM Reference: describes what Gemini CLI expects for rules and skills.
# NOT enforced by build system — informational for translator authoring.

rules:
  format: single_file
  content_type: markdown
  file_name: "GEMINI.md"
  frontmatter: strip
  heading_style: atx
  bullet_style: dash
  no_code_blocks: false

skills:
  format: directory
  content_type: markdown
  frontmatter: strip
  heading_style: atx
  bullet_style: dash

notes: |
  Gemini CLI uses GEMINI.md as a rules file (appended via marker-boundary blocks).
  Skills are copied to the skills/ directory under ~/.gemini/.
  Schema Engine automatically strips frontmatter and normalizes formatting.
