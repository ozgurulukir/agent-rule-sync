# Windsurf Platform Format Profile
# LLM Reference: describes what Windsurf expects for rules and skills.
# NOT enforced by build system — informational for translator authoring.

rules:
  format: markdown
  heading_style: atx
  bullet_style: dash
  code_block: fenced
  frontmatter: strip
  max_heading_depth: 3
  note: "Rules go to .windsurf/rules/*.md"
  special: ".windsurfrules is a Windsurf-specific config file (not a rule)"

skills:
  format: directory_or_bundle  # single SKILL.md or skill-bundle directory
  content_type: markdown
  frontmatter: strip
  content:
    - "# Skill Name"
    - "## Overview"
    - "## Capabilities"
    - "## Usage"
  bullet_style: dash
  code_block: fenced
  note: "Skills go to .windsurf/skills/*/SKILL.md"

notes: |
  Windsurf reads .windsurf/rules/*.md and .windsurf/skills/*/SKILL.md.
  Project-scoped. Similar to Cursor.
